<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon PEA">
<title>ETF Assistant PEA</title>
<style>
:root {
  --bg: #090d16;
  --card: #121826;
  --input: #1b2336;
  --text: #f3f4f6;
  --text-muted: #6b7280;
  --usa: #38bdf8;
  --eu: #34d399;
  --em: #fbbf24;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:16px;font-size:15px;}
.card{background:var(--card);padding:16px;border-radius:14px;margin-bottom:14px;border:1px solid #1e293b;}
h2{margin:0 0 14px;font-size:15px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
input[type=number]{padding:12px;border-radius:8px;border:none;background:var(--input);color:white;font-size:16px;width:100%;transition:background 0.2s;}
input[type=number]:focus{background:#222b40;outline:none;}
.row{display:flex;gap:10px;margin-bottom:8px;align-items:center;}
.row label{width:110px;min-width:110px;font-size:13px;color:var(--text-muted);}
.row input{flex:1;}
button{width:100%;padding:14px;border:none;border-radius:10px;font-weight:bold;font-size:15px;cursor:pointer;transition:transform 0.1s,opacity 0.2s;}
button:active{transform:scale(0.98);opacity:0.9;}
.btn-blue{background:var(--usa);color:#090d16;}
.btn-green{background:var(--eu);color:#090d16;}
.btn-red{background:#f87171;color:#090d16;}
.btn-gray{background:var(--input);color:var(--text-muted);font-size:13px;padding:10px;}
.tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--card);padding:4px;border-radius:10px;}
.tab{flex:1;padding:8px 2px;border:none;border-radius:6px;background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;font-weight:500;}
.tab.active{background:var(--input);color:white;font-weight:600;}
.section{display:none;}.section.active{display:block;}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:bold;}
.tag-usa{background:#1e3a5f;color:var(--usa);}
.tag-eu{background:#1a3a2a;color:var(--eu);}
.tag-em{background:#3a2a00;color:var(--em);}
.bar-container{background:var(--input);border-radius:8px;height:14px;overflow:hidden;display:flex;margin:8px 0;}
.bar{height:100%;transition:width 0.4s;}
.prix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.prix-box{background:var(--card);padding:10px;border-radius:10px;text-align:center;border:1px solid #1e293b;}
.prix-box div{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.prix-box span{font-size:16px;font-weight:bold;}
.alert-status{padding:12px;border-radius:10px;font-size:13px;margin-top:10px;font-weight:500;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.stat-box{background:var(--input);border-radius:10px;padding:12px;text-align:center;}
.stat-val{font-size:18px;font-weight:bold;margin-top:4px;}
.stat-lbl{font-size:11px;color(--text-muted);}
.hist-item{background:var(--input);border-radius:10px;padding:12px;margin-bottom:8px;font-size:13px;}
.sim-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--input);font-size:13px;}
.divider{border:none;border-top:1px solid var(--input);margin:12px 0;}
</style>
</head>
<body>
<div style="max-width:600px;margin:auto;">

<div style="text-align:center;margin-bottom:16px;font-size:18px;font-weight:700;letter-spacing:-0.5px;">
  Mon Assistant ETF PEA
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('portefeuille')">Saisie</button>
  <button class="tab" onclick="showTab('analyse')">Analyse</button>
  <button class="tab" onclick="showTab('stats')">Suivi</button>
  <button class="tab" onclick="showTab('historique')">Ordres</button>
  <button class="tab" onclick="showTab('config')">Cibles</button>
</div>

<!-- SECTION 1 : SAISIE -->
<div id="tab-portefeuille" class="section active">
  <div class="card">
    <h2>1. Cours actuels (€)</h2>
    <div class="row"><label><span class="tag tag-usa">S&P 500</span></label><input id="p_usa" type="number" inputmode="decimal" value="56.34" oninput="updatePrixTotaux()"></div>
    <div class="row"><label><span class="tag tag-eu">Stoxx 600</span></label><input id="p_eu" type="number" inputmode="decimal" value="20.47" oninput="updatePrixTotaux()"></div>
    <div class="row"><label><span class="tag tag-em">Emergents</span></label><input id="p_em" type="number" inputmode="decimal" value="7.75" oninput="updatePrixTotaux()"></div>
  </div>

  <div class="card">
    <h2>2. Vos Parts Actuelles</h2>
    <div class="row"><label><span class="tag tag-usa">S&P 500</span> parts</label><input id="usa_q" type="number" inputmode="decimal" placeholder="0" oninput="saveInputs()"></div>
    <div class="row"><label><span class="tag tag-eu">Stoxx 600</span> parts</label><input id="eu_q" type="number" inputmode="decimal" placeholder="0" oninput="saveInputs()"></div>
    <div class="row"><label><span class="tag tag-em">Emergents</span> parts</label><input id="em_q" type="number" inputmode="decimal" placeholder="0" oninput="saveInputs()"></div>
    <hr class="divider">
    <div class="row"><label>Budget à investir</label><input id="budget" type="number" inputmode="decimal" placeholder="En euros (€)" oninput="saveInputs()"></div>
    <button class="btn-blue" style="margin-top:10px;" onclick="executerAnalyse()">🚀 Lancer l'analyse</button>
  </div>
</div>

<!-- SECTION 2 : ANALYSE -->
<div id="tab-analyse" class="section">
  <div class="prix-grid">
    <div class="prix-box"><div>S&P 500</div><span id="v-usa">--</span></div>
    <div class="prix-box"><div>Stoxx 600</div><span id="v-eu">--</span></div>
    <div class="prix-box"><div>Emergents</div><span id="v-em">--</span></div>
  </div>
  <div id="res-analyse"></div>
</div>

<!-- SECTION 3 : SUIVI -->
<div id="tab-stats" class="section">
  <div id="stats-container"></div>
</div>

<!-- SECTION 4 : ORDRES -->
<div id="tab-historique" class="section">
  <div id="hist-container"></div>
  <div style="display:flex;gap:8px;margin-top:8px;">
    <button class="btn-gray" onclick="exportCSV()">📤 Exporter CSV</button>
    <button class="btn-red" style="padding:10px;" onclick="clearHist()">🗑️ Reset</button>
  </div>
</div>

<!-- SECTION 5 : CIBLES -->
<div id="tab-config" class="section">
  <div class="card">
    <h2>Allocation Cible (%)</h2>
    <div class="row"><label>S&P 500</label><input id="c_usa" type="number" inputmode="decimal" oninput="updateCibleTotal()"></div>
    <div class="row"><label>Stoxx 600</label><input id="c_eu" type="number" inputmode="decimal" oninput="updateCibleTotal()"></div>
    <div class="row"><label>Emergents</label><input id="c_em" type="number" inputmode="decimal" oninput="updateCibleTotal()"></div>
    <div id="cible-total" style="margin-top:10px;font-size:13px;font-weight:bold;"></div>
    <button class="btn-green" style="margin-top:12px;" onclick="saveCibles()">💾 Sauvegarder les cibles</button>
  </div>
  <div class="card">
    <h2>Seuils d'alerte</h2>
    <div class="row"><label>Déviation (%)</label><input id="alerte_seuil" type="number" inputmode="decimal"></div>
    <button class="btn-gray" style="margin-top:6px;" onclick="saveSettings()">Appliquer le seuil</button>
  </div>
</div>

</div>

<script>
function loadData() {
  var local = localStorage.getItem("etf_manual_pea_v3");
  if (local) {
    try { return JSON.parse(local); } catch(e) {}
  }
  return {
    cibles: { usa: 60, eu: 30, em: 10 },
    portefeuille: { usa_q: '', eu_q: '', em_q: '' },
    prix: { usa: 56.34, eu: 20.47, em: 7.75 },
    historique: [],
    settings: { budget: '', alerte_seuil: 5 }
  };
}

function saveData(d) { localStorage.setItem("etf_manual_pea_v3", JSON.stringify(d)); }

var appData = loadData();

function init() {
  document.getElementById('p_usa').value = appData.prix.usa;
  document.getElementById('p_eu').value = appData.prix.eu;
  document.getElementById('p_em').value = appData.prix.em;
  
  document.getElementById('usa_q').value = appData.portefeuille.usa_q;
  document.getElementById('eu_q').value = appData.portefeuille.eu_q;
  document.getElementById('em_q').value = appData.portefeuille.em_q;
  document.getElementById('budget').value = appData.settings.budget;
  
  document.getElementById('c_usa').value = appData.cibles.usa;
  document.getElementById('c_eu').value = appData.cibles.eu;
  document.getElementById('c_em').value = appData.cibles.em;
  document.getElementById('alerte_seuil').value = appData.settings.alerte_seuil;
  
  updatePrixTotaux();
}

function saveInputs() {
  appData.prix = {
    usa: +document.getElementById('p_usa').value || 0,
    eu: +document.getElementById('p_eu').value || 0,
    em: +document.getElementById('p_em').value || 0
  };
  appData.portefeuille = {
    usa_q: document.getElementById('usa_q').value,
    eu_q: document.getElementById('eu_q').value,
    em_q: document.getElementById('em_q').value
  };
  appData.settings.budget = document.getElementById('budget').value;
  saveData(appData);
}

function updatePrixTotaux() {
  saveInputs();
  document.getElementById('v-usa').textContent = appData.prix.usa.toFixed(2) + ' €';
  document.getElementById('v-eu').textContent = appData.prix.eu.toFixed(2) + ' €';
  document.getElementById('v-em').textContent = appData.prix.em.toFixed(2) + ' €';
}

function showTab(name) {
  var tabs = ['portefeuille','analyse','stats','historique','config'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', tabs[i]===name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='stats') renderStats();
  if(name==='historique') renderHist();
  if(name==='config') updateCibleTotal();
}

function executerAnalyse() {
  saveInputs();
  showTab('analyse');
  calc();
}

function calc() {
  var uq = +appData.portefeuille.usa_q || 0;
  var eq = +appData.portefeuille.eu_q || 0;
  var mq = +appData.portefeuille.em_q || 0;
  var b = +appData.settings.budget || 0;
  
  var up = appData.prix.usa, ep = appData.prix.eu, mp = appData.prix.em;
  var u = uq*up, e = eq*ep, m = mq*mp, totActuel = u+e+m;
  
  if(!totActuel && !b) {
    document.getElementById('res-analyse').innerHTML = '<div class="card">⚠️ Indiquez au moins vos parts ou un budget.</div>';
    return;
  }

  var pU = totActuel ? (u/totActuel)*100 : 0;
  var pE = totActuel ? (e/totActuel)*100 : 0;
  var pM = totActuel ? (m/totActuel)*100 : 0;
  
  // ALGORITHME DE SÉLECTION D'UN SEUL ETF (ÉCONOMIE DE FRAIS DE COURTAGE)
  var cU = appData.cibles.usa, cE = appData.cibles.eu, cM = appData.cibles.em;
  var devU = cU - pU;
  var devE = cE - pE;
  var devM = cM - pM;
  
  var cibleNom = '', cibleTag = '', ciblePrix = 0, labelClass = '';
  
  if (devE >= devU && devE >= devM) {
    cibleNom = 'BNP Stoxx 600'; cibleTag = 'eu'; ciblePrix = ep; labelClass = 'tag-eu';
  } else if (devM >= devU && devM >= devE) {
    cibleNom = 'Amundi Emergents'; cibleTag = 'em'; ciblePrix = mp; labelClass = 'tag-em';
  } else {
    cibleNom = 'Amundi S&P 500'; cibleTag = 'usa'; ciblePrix = up; labelClass = 'tag-usa';
  }

  // Calcul du nombre de parts max possibles sur cet ETF unique en déduisant 1€ de frais fixes
  var nParts = 0;
  var cashAchatNecessaire = 0;
  if (b > 1 && ciblePrix > 0) {
    nParts = Math.floor((b - 1) / ciblePrix);
    cashAchatNecessaire = (nParts * ciblePrix) + 1; // Parts + 1€ de frais
  }
  var resteCash = b - cashAchatNecessaire;

  var seuil = appData.settings.alerte_seuil || 5;
  var alertHtml = '';
  var hasAlerte = Math.abs(pU-cU)>seuil || Math.abs(pE-cE)>seuil || Math.abs(pM-cM)>seuil;
  
  if(hasAlerte && totActuel > 0) {
    alertHtml = '<div class="alert-status" style="background:#2a1e00; color:var(--em); border-left:4px solid var(--em);">⚠️ Portefeuille déséquilibré (Seuil > '+seuil+'%)</div>';
  } else if (totActuel > 0) {
    alertHtml = '<div class="alert-status" style="background:#13271e; color:var(--eu); border-left:4px solid var(--eu);">✅ Répartition équilibrée conforme aux cibles</div>';
  }

  var html = '<div class="card">' +
    '<h2>Allocation Actuelle</h2>' +
    barLine('Amundi S&P 500', 'tag-usa', pU, cU) +
    barLine('BNP Stoxx 600', 'tag-eu', pE, cE) +
    barLine('Amundi Emergents', 'tag-em', pM, cM) +
    '<div class="bar-container">' +
      '<div class="bar" style="background:var(--usa);width:'+pU+'%"></div>' +
      '<div class="bar" style="background:var(--eu);width:'+pE+'%"></div>' +
      '<div class="bar" style="background:var(--em);width:'+pM+'%"></div>' +
    '</div>' +
    '<div style="font-size:13px; text-align:right; color:var(--text-muted); margin-top:6px;">Valeur : <b>'+totActuel.toFixed(2)+' €</b></div>' +
    alertHtml +
  '</div>';

  if (b > 0) {
    html += '<div class="card" style="border-top:4px solid var(--usa);">' +
      '<h2>Ordre Unique Suggéré (Frais optimisés)</h2>';
      if(nParts > 0) {
        html += '<div style="margin:8px 0; font-size:16px;">Acheter : <span class="tag '+labelClass+'">'+cibleNom+'</span> × <b>'+nParts+'</b> part(s)</div>' +
        '<div style="color:var(--text-muted); font-size:13px; margin-bottom:12px;">Prix des parts : '+(nParts * ciblePrix).toFixed(2)+' € + 1.00 € (Frais d\'ordre)</div>' +
        '<hr class="divider">' +
        '<div style="font-size:13px; display:flex; justify-content:space-between; margin-bottom:12px;">' +
          '<span>Total débité du compte : <b>'+cashAchatNecessaire.toFixed(2)+' €</b></span>' +
          '<span style="color:var(--em);">Reste : <b>'+resteCash.toFixed(2)+' €</b></span>' +
        '</div>' +
        '<button class="btn-green" onclick="validerAchatUnique(\''+cibleNom+'\',\''+cibleTag+'\','+nParts+','+ciblePrix+')">✅ Valider et enregistrer cet unique ordre</button>';
      } else {
        html += '<div style="color:#f87171; font-size:13px; padding:6px 0;">⚠️ Budget trop juste ('+b+' €) pour acquérir 1 part de '+cibleNom+' après déduction de 1 € de frais.</div>';
      }
    html += '</div>';
  }
  
  document.getElementById('res-analyse').innerHTML = html;
}

function barLine(label, tag, val, cible) {
  var diff = val - cible;
  return '<div style="display:flex;justify-content:space-between;font-size:13px;margin:6px 0;">' +
    '<span><span class="tag '+tag+'">'+label+'</span></span>' +
    '<span><b>'+val.toFixed(1)+'%</b> <span style="color:'+(Math.abs(diff)<3?'var(--eu)':diff>0?'var(--em)':'#f87171')+';">('+(diff>=0?'+':'')+diff.toFixed(1)+'%)</span> / cible '+cible+'%</span>' +
  '</div>';
}

function validerAchatUnique(nom, tag, nb, prix) {
  var now = new Date();
  var dateStr = now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var netTotal = (nb * prix);
  
  // Enregistrement brut (hors frais pour garder un PRU exact basé sur les parts réelles)
  appData.historique.unshift({date:dateStr, etf:nom, tag:tag, nb:nb, prix:prix, total:netTotal.toFixed(2)});

  if(tag==='usa') appData.portefeuille.usa_q = (+appData.portefeuille.usa_q || 0) + nb;
  if(tag==='eu') appData.portefeuille.eu_q = (+appData.portefeuille.eu_q || 0) + nb;
  if(tag==='em') appData.portefeuille.em_q = (+appData.portefeuille.em_q || 0) + nb;
  
  appData.settings.budget = '';
  document.getElementById('budget').value = '';
  
  document.getElementById('usa_q').value = appData.portefeuille.usa_q;
  document.getElementById('eu_q').value = appData.portefeuille.eu_q;
  document.getElementById('em_q').value = appData.portefeuille.em_q;
  
  saveData(appData);
  executerAnalyse();
  alert('✅ Ordre unique enregistré ! Vos positions ont été incrémentées.');
}

function renderStats() {
  var hist = appData.historique;
  var up = appData.prix.usa, ep = appData.prix.eu, mp = appData.prix.em;
  var uq = +appData.portefeuille.usa_q || 0;
  var eq = +appData.portefeuille.eu_q || 0;
  var mq = +appData.portefeuille.em_q || 0;
  
  var valActuelle = (uq*up) + (eq*ep) + (mq*mp);
  var inv = {usa:0, eu:0, em:0}, parts = {usa:0, eu:0, em:0};
  
  hist.forEach(function(a){
    inv[a.tag] += parseFloat(a.total);
    parts[a.tag] += a.nb;
  });
  
  var totalInvesti = inv.usa + inv.eu + inv.em;
  var gain = valActuelle - totalInvesti;
  var perf = totalInvesti > 0 ? (gain / totalInvesti * 100) : 0;

  function getPru(k) { return parts[k] > 0 ? (inv[k]/parts[k]).toFixed(2) + ' €' : '—'; }

  document.getElementById('stats-container').innerHTML = 
    '<div class="card">' +
      '<h2>Performance Totale (via Historique)</h2>' +
      '<div class="stat-grid">' +
        '<div class="stat-box"><div class="stat-lbl">Actuel</div><div class="stat-val">'+valActuelle.toFixed(0)+' €</div></div>' +
        '<div class="stat-box"><div class="stat-lbl">Investi</div><div class="stat-val">'+totalInvesti.toFixed(0)+' €</div></div>' +
        '<div class="stat-box"><div class="stat-lbl">Plus/Moins value</div><div class="stat-val" style="color:'+(gain>=0?'var(--eu)':'#f87171')+';">'+(gain>=0?'+':'')+gain.toFixed(1)+' €</div></div>' +
        '<div class="stat-box"><div class="stat-lbl">Rendement</div><div class="stat-val" style="color:'+(perf>=0?'var(--eu)':'#f87171')+';">'+(perf>=0?'+':'')+perf.toFixed(1)+'%</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<h2>Prix de Revient Moyen (PRU)</h2>' +
      '<div class="sim-row"><span class="tag tag-usa">S&P 500</span> <span>PRU : <b>'+getPru('usa')+'</b></span> <span style="color:var(--text-muted);">Cours : '+up+' €</span></div>' +
      '<div class="sim-row"><span class="tag tag-eu">Stoxx 600</span> <span>PRU : <b>'+getPru('eu')+'</b></span> <span style="color:var(--text-muted);">Cours : '+ep+' €</span></div>' +
      '<div class="sim-row"><span class="tag tag-em">Emergents</span> <span>PRU : <b>'+getPru('em')+'</b></span> <span style="color:var(--text-muted);">Cours : '+mp+' €</span></div>' +
    '</div>';
}

function renderHist() {
  var hist = appData.historique;
  var c = document.getElementById('hist-container');
  if(!hist.length) { c.innerHTML = '<div class="card" style="text-align:center;color:var(--text-muted);">Aucun ordre mémorisé.</div>'; return; }
  
  var rows = hist.map(function(a){
    var cl = 'tag-' + a.tag;
    return '<div class="hist-item">' +
      '<span class="tag '+cl+'">'+a.etf+'</span> <b>+'+a.nb+'</b> part(s) @ '+a.prix.toFixed(2)+'€' +
      '<span style="float:right;font-weight:600;color:var(--eu);">'+a.total+' €</span>' +
      '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">'+a.date+'</div>' +
    '</div>';
  }).join('');
  c.innerHTML = '<div class="card"><h2>Registre d\'ordres passés</h2>' + rows + '</div>';
}

function exportCSV() {
  var lines = ['Date,ETF,Parts,Prix,Total'];
  appData.historique.forEach(function(a){ lines.push([a.date, a.etf, a.nb, a.prix, a.total].join(',')); });
  var blob = new Blob([lines.join('\n')], {type: 'text/csv;charset=utf-8;'});
  var link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "pea_historique.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function clearHist() {
  if(confirm('Supprimer l\'historique ? (Vos parts déjà saisies resteront intactes)')) {
    appData.historique = [];
    saveData(appData);
    renderHist();
  }
}

function updateCibleTotal() {
  var u = +document.getElementById('c_usa').value || 0;
  var e = +document.getElementById('c_eu').value || 0;
  var m = +document.getElementById('c_em').value || 0;
  var t = u + e + m;
  document.getElementById('cible-total').innerHTML = 'Total : <b style="color:'+(t===100?'var(--eu)':'#f87171')+'">'+t+'%</b>' + (t===100?' ✓':' ⚠️');
}

function saveCibles() {
  var u = +document.getElementById('c_usa').value || 0;
  var e = +document.getElementById('c_eu').value || 0;
  var m = +document.getElementById('c_em').value || 0;
  if(u+e+m !== 100) { alert('Le total doit faire précisément 100% !'); return; }
  appData.cibles = { usa: u, eu: e, em: m };
  saveData(appData);
  alert('Cibles de l\'allocation enregistrées.');
}

function saveSettings() {
  appData.settings.alerte_seuil = +document.getElementById('alerte_seuil').value || 5;
  saveData(appData);
  alert('Seuil appliqué.');
}

init();
</script>
</body>
</html>
